version: "3.8"

# LocalStack — use during the 45-day Ultimate trial
# Requires: LOCALSTACK_AUTH_TOKEN env var (get from localstack.cloud dashboard)
# After trial: evaluate whether to pay $24-39/mo or switch to Floci permanently

services:
  localstack:
    image: localstack/localstack:latest
    container_name: lambda-test-localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-data:/var/lib/localstack"
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - SERVICES=s3,sqs,dynamodb,lambda,sns,ses,apigateway,kms,cloudwatch
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
