version: "3.8"

# Floci — free, MIT-licensed, zero-auth AWS emulator
# Covers: S3, SQS, DynamoDB, Lambda, SNS, SES, API Gateway, KMS, CloudWatch
# Docs: https://github.com/hectorvent/floci

services:
  emulator:
    image: hectorvent/floci:latest
    container_name: lambda-test-emulator
    hostname: floci
    ports:
      - "4566:4566"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - SERVICES=s3,sqs,dynamodb,lambda,sns,ses,apigateway,kms,cloudwatch
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # ── Lambda sub-container networking ─────────────────────────
      # Spawned Lambda containers must reach Floci's Runtime API back.
      # FLOCI_SERVICES_LAMBDA_DOCKER_NETWORK tells Floci which network to
      # attach the sub-containers to so they can hit the Runtime endpoint.
      # FLOCI_HOSTNAME tells spawned containers to resolve "floci" instead
      # of a container IP that may not route.
      # Network name is derived by Docker Compose from the parent directory:
      # lowercased + non-alphanumerics stripped + "_default" suffix.
      # If you rename the repo dir, regenerate with: docker network ls | grep default
      - FLOCI_SERVICES_LAMBDA_DOCKER_NETWORK=dependabotvulnerabilitytracker_default
      - FLOCI_HOSTNAME=floci
    networks:
      default:
        aliases:
          - floci
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
