version: "3.8"

# Pin project name so the auto-created network is stable regardless of the
# parent directory the compose file is run from. Without this, renaming the
# repo dir changes the network name (e.g. `dependabotvulnerabilitytracker_default`
# → `localtestingforlambda_default`) and FLOCI_SERVICES_LAMBDA_DOCKER_NETWORK
# below silently points at a network that does not exist → Lambda init fails
# with: "Failed to start Lambda container: network ... not found".
name: floci-lambda-test

# Floci — free, MIT-licensed, zero-auth AWS emulator
# Covers: S3, SQS, DynamoDB, Lambda, SNS, SES, API Gateway, KMS, CloudWatch
# Docs: https://github.com/hectorvent/floci

services:
  emulator:
    image: hectorvent/floci:latest
    container_name: lambda-test-emulator
    hostname: floci
    ports:
      - "4566:4566"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      # Persist Lambda code + S3 + DDB across restarts (hybrid storage mode).
      # Without this, every `docker restart lambda-test-emulator` wipes all
      # deployed functions and you must redeploy. See Floci storage docs:
      # https://floci.io/floci/configuration/storage/
      - "./data:/app/data"
    environment:
      - SERVICES=s3,sqs,dynamodb,lambda,sns,ses,apigateway,kms,cloudwatch
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # ── Lambda sub-container networking ─────────────────────────
      # Spawned Lambda containers must reach Floci's Runtime API back.
      # FLOCI_SERVICES_LAMBDA_DOCKER_NETWORK tells Floci which network to
      # attach the sub-containers to so they can hit the Runtime endpoint.
      # FLOCI_HOSTNAME tells spawned containers to resolve "floci" instead
      # of a container IP that may not route.
      # Network name = "<compose project name>_default". Project name is pinned
      # at the top of this file (`name: floci-lambda-test`) so this stays stable.
      - FLOCI_SERVICES_LAMBDA_DOCKER_NETWORK=floci-lambda-test_default
      - FLOCI_HOSTNAME=floci
      # ── Storage: hybrid = in-memory for speed + periodic flush to disk ──
      # Lambda code, S3 objects, DDB tables persist across Floci restarts.
      - FLOCI_STORAGE_MODE=hybrid
      # ── Warm pool: keep containers alive between invocations for speed ──
      # 300s idle = faster iteration during active testing. Set EPHEMERAL=true
      # if you need guaranteed fresh code on every invoke (slower cold starts).
      - FLOCI_SERVICES_LAMBDA_CONTAINER_IDLE_TIMEOUT_SECONDS=300
      - FLOCI_SERVICES_LAMBDA_EPHEMERAL=false
    networks:
      default:
        aliases:
          - floci
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
